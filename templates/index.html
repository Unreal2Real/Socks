<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>厂字形态扫描器</title>
<style>
:root{--bg:#0f1117;--card:#1a1d28;--border:#2a2d3a;--text:#d1d4dc;
  --dim:#787b86;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--accent:#3b82f6;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);padding:16px}
h2{font-size:16px;margin-bottom:12px;color:#fff}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.card-sticky{position:sticky;top:0;z-index:100;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
input,select,button{padding:8px 12px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg);color:var(--text);font-size:14px}
button{cursor:pointer;font-weight:500;transition:all .2s}
button:hover{opacity:.9}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-success{background:var(--green);color:#fff;border-color:var(--green)}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:4px}
.btn-accept{background:rgba(34,197,94,.2);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.btn-accept:hover{background:rgba(34,197,94,.35)}
.btn-reject{background:rgba(239,68,68,.2);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-reject:hover{background:rgba(239,68,68,.35)}
.btn-ml{padding:2px 6px;font-size:10px}
.ml-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;
  z-index:1000;width:420px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.ml-panel.active{display:block}
.ml-panel h3{font-size:14px;margin-bottom:12px;color:#fff}
.ml-panel input{width:100%;margin-bottom:8px}
.ml-panel label{display:block;font-size:11px;color:var(--dim);margin-bottom:2px}
.ml-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.6);z-index:999}
.ml-overlay.active{display:block}
.ml-stats{font-size:11px;color:var(--dim);margin-bottom:8px;display:flex;gap:16px}
.ml-stats strong{color:var(--text)}
.ml-model-ready{color:var(--green)}
.ml-corrected{color:var(--orange)}
input{width:120px}
#kline-placeholder{width:100%;height:100px;display:flex;align-items:center;justify-content:center;border:1px dashed var(--border);border-radius:6px;color:var(--dim);font-size:13px;cursor:pointer}
#kline-placeholder:hover{border-color:var(--accent);color:var(--accent)}
#kline-chart{width:100%;height:400px;display:none}
#currentStock{font-size:14px;font-weight:600;margin-left:8px;color:var(--text)}
#currentStock .name{color:var(--accent)}
.progress-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:8px 0}
.progress-bar{height:100%;background:var(--accent);width:0;transition:width .3s}
.log{max-height:200px;overflow-y:auto;font-size:12px;font-family:monospace;line-height:1.6}
.log .info{color:var(--dim)}.log .ok{color:var(--green)}
.log .warn{color:var(--orange)}.log .err{color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--dim);font-weight:500;font-size:12px;text-transform:uppercase}
tr:hover{background:rgba(59,130,246,.05)}
tr{cursor:pointer}
.tag{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-green{background:rgba(34,197,94,.15);color:var(--green)}
.tag-orange{background:rgba(245,158,11,.15);color:var(--orange)}
.tag-blue{background:rgba(59,130,246,.15);color:var(--accent)}
.tag-red{background:rgba(239,68,68,.15);color:var(--red)}
.tag-gray{background:rgba(120,123,134,.15);color:var(--dim)}
.pattern-info{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:12px}
.pattern-info .item{background:rgba(255,255,255,.03);padding:8px 10px;border-radius:4px}
.pattern-info .label{font-size:11px;color:var(--dim)}.pattern-info .value{font-size:14px;font-weight:600}
.text-green{color:var(--green)}
.text-dim{color:var(--dim)}
.status{font-size:13px;color:var(--dim);margin:4px 0}
tr.unviewed{background:rgba(59,130,246,.12)}
tr.unviewed:hover{background:rgba(59,130,246,.2)}
tr.unviewed td:first-child{font-weight:700}
.new-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:6px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#aiResult{display:none;margin-top:12px;background:rgba(34,197,94,.04);border:1px solid rgba(34,197,94,.15);border-radius:8px;padding:14px;font-size:13px;line-height:1.7;white-space:pre-wrap;max-height:500px;overflow-y:auto}
#aiResult.grade-A{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.06)}
#aiResult.grade-B{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.05)}
#aiResult.grade-C{border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.04)}
#aiResult.grade-D{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.04)}
#aiResult .grade-badge{display:inline-block;padding:4px 12px;border-radius:6px;font-size:16px;font-weight:700;margin-bottom:8px}
#aiResult .grade-badge.grade-A{background:rgba(34,197,94,.2);color:var(--green)}
#aiResult .grade-badge.grade-B{background:rgba(245,158,11,.2);color:var(--orange)}
#aiResult .grade-badge.grade-C{background:rgba(59,130,246,.2);color:var(--accent)}
#aiResult .grade-badge.grade-D{background:rgba(239,68,68,.2);color:var(--red)}
.btn-ai{background:linear-gradient(135deg,#7c3aed,#3b82f6);color:#fff;border-color:transparent;animation:aiGlow 3s infinite}
@keyframes aiGlow{0%,100%{box-shadow:0 0 8px rgba(124,58,237,.3)}50%{box-shadow:0 0 20px rgba(59,130,246,.6)}}
#correctBanner{display:none;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:6px;padding:10px 14px;margin:8px 0;font-size:13px;color:var(--orange)}
#correctBanner .step{display:inline-block;background:rgba(245,158,11,.15);padding:2px 8px;border-radius:4px;margin:0 4px;font-weight:600}
#correctBanner .step.active{background:var(--orange);color:#000}
#correctBanner .step.done{background:rgba(34,197,94,.15);color:var(--green)}
#correctBanner .hint{font-size:11px;color:var(--dim);margin-top:4px}
#choiceDialog{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:24px;z-index:1100;width:380px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#choiceDialog.active{display:block}
#choiceDialog p{font-size:14px;margin-bottom:16px;color:var(--text);line-height:1.6}
#choiceDialog .btns{display:flex;gap:10px;justify-content:center}
#choiceOverlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:1099}
#choiceOverlay.active{display:block}
</style>
</head>
<body>

<div class="card-sticky">
  <h2>📈 个股分析</h2>
  <div class="row">
    <input id="stockCode" type="text" placeholder="股票代码" value="600519">
    <button class="btn-primary" onclick="analyzeStock()">分析</button>
    <button class="btn-ai btn-sm" onclick="aiAnalyze()">AI分析</button>
    <span id="currentStock"></span>
  </div>
  <div id="kline-placeholder" onclick="document.getElementById('stockCode').focus()">👆 输入代码或点击下方股票查看K线图</div>
  <div id="correctBanner">
    🔧 纠正：请在K线上依次点击
    <span class="step active" id="stepStart">①上涨起点</span>
    <span class="step" id="stepPeak">②峰顶</span>
    <span class="step" id="stepEnd">③盘整结束</span>
    <button class="btn-sm btn-primary" id="btnConfirm" style="display:none;float:right;margin-left:8px" onclick="submitChartCorrection()">确认提交</button>
    <span style="float:right;cursor:pointer;margin-left:12px" onclick="cancelCorrect()">✕</span>
    <div class="hint" id="correctHint">点击K线上任意蜡烛 → 选中日期</div>
  </div>
  <div id="kline-chart"></div>
  <div id="patternDetail" class="pattern-info" style="display:none"></div>
  <div id="aiResult"></div>
</div>

<div class="card">
  <h2>🔍 大盘扫描</h2>
  <div class="row">
    <select id="scanMode">
      <option value="200">增量扫描（200只）</option>
      <option value="0">全量扫描（全部）</option>
    </select>
    <button class="btn-primary" id="btnStart" onclick="startScan()">▶ 开始扫描</button>
    <button class="btn-danger" id="btnStop" onclick="stopScan()" disabled>⏹ 停止</button>
  </div>
  <div class="status" id="scanStatus">就绪</div>
  <div class="status" id="lastScanInfo" style="display:none"></div>
  <div class="progress-wrap"><div class="progress-bar" id="scanProgress"></div></div>
  <div id="scanLog" class="log"></div>
  <div id="scanResults" style="margin-top:12px"></div>
  <div id="mlStats" class="ml-stats" style="display:none"></div>
</div>

<div class="ml-overlay" id="mlOverlay" onclick="closeMLPanel()"></div>
<div class="ml-panel" id="mlPanel">
  <h3>🔧 纠正形态 (告诉模型什么样是对的)</h3>
  <p class="text-dim" style="font-size:12px;margin-bottom:12px" id="mlPanelCode"></p>
  <label>正确的上涨起点</label>
  <input id="mlCorrectStart" type="text" placeholder="YYYY-MM-DD">
  <label>正确的盘整开始(峰顶)</label>
  <input id="mlCorrectPeak" type="text" placeholder="YYYY-MM-DD">
  <label>正确的盘整结束</label>
  <input id="mlCorrectEnd" type="text" placeholder="YYYY-MM-DD">
  <div class="row" style="margin-top:12px">
    <button class="btn-primary" onclick="submitCorrection()">提交纠正</button>
    <button onclick="closeMLPanel()">取消</button>
  </div>
</div>

<div id="choiceOverlay" class="choice-backdrop"></div>
<div id="choiceDialog">
  <p id="choiceMsg"></p>
  <div class="btns">
    <button class="btn-primary" id="choiceBtn1">修改</button>
    <button id="choiceBtn2">完全不符</button>
  </div>
</div>

<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script>
let chart = null, candleSeries = null, volumeSeries = null, lineSeries = {};
let scanTimer = null;
let viewedStocks = new Set();
let scanResultsStore = [];
let labeledStocks = {};
let correctMode = false, correctClicks = [], correctCode = '', correctName = '';
let chartClickHandler = null;

document.addEventListener('DOMContentLoaded',function(){
  loadLastScan();
  document.getElementById('scanResults').addEventListener('click',function(e){
    var tr = e.target.closest('tr');
    if (!tr) return;
    var code = tr.getAttribute('data-code');
    if (code){
      if (e.target.closest('button')) return;
      if (e.target.closest('.btn-ml')) return;
      var info = scanResultsStore.find(function(r){return r.stock_code===code;});
      viewStock(code, info ? info.stock_name : '');
    }
  });
});

function createChart() {
  const el = document.getElementById('kline-chart');
  if (chart) { el.innerHTML = ''; chart = null; }
  chart = LightweightCharts.createChart(el, {
    height: 500,
    layout: { background: { color: '#1a1d28' }, textColor: '#d1d4dc' },
    grid: { vertLines: { color: '#2a2d3a' }, horzLines: { color: '#2a2d3a' } },
    crosshair: { mode: 1 },
    rightPriceScale: { borderColor: '#2a2d3a', scaleMargins: { top: 0.05, bottom: 0.3 } },
    timeScale: { borderColor: '#2a2d3a', timeVisible: true, rightOffset: 8 }
  });

  candleSeries = chart.addCandlestickSeries({
    upColor: '#dc2626', downColor: '#16a34a',
    borderUpColor: '#dc2626', borderDownColor: '#16a34a',
    wickUpColor: '#dc2626', wickDownColor: '#16a34a',
  });

  volumeSeries = chart.addHistogramSeries({
    priceFormat: { type: 'volume' },
    priceScaleId: 'volume',
  });
  chart.priceScale('volume').applyOptions({
    scaleMargins: { top: 0.7, bottom: 0 },
    borderColor: '#2a2d3a',
    visible: true,
    entireTextOnly: true,
  });

  ['ma5','ma10','ma20'].forEach(k => {
    lineSeries[k] = chart.addLineSeries({
      color: k==='ma5'?'#fbbf24':k==='ma10'?'#60a5fa':'#c084fc',
      lineWidth: 1,
      lineStyle: k==='ma5' ? 0 : (k==='ma10' ? 1 : 2),
    });
  });

  if (chartClickHandler) { chart.unsubscribeClick(chartClickHandler); }
  chartClickHandler = chart.subscribeClick(function(param) {
    if (!correctMode) return;
    if (!param.time) return;
    var t = param.time;
    if (typeof t === 'number') { t = new Date(t*1000).toISOString().slice(0,10); }
    correctClicks.push(t);
    updateCorrectSteps();
  });
}

async function analyzeStock() {
  const code = document.getElementById('stockCode').value.trim();
  if (!code) return;
  document.getElementById('patternDetail').style.display = 'none';
  document.getElementById('aiResult').style.display = 'none';
  try {
    const r = await fetch(`/api/stock/${code}?days=250`);
    const j = await r.json();
    if (j.code !== 0) return alert(j.msg);
    document.getElementById('kline-placeholder').style.display = 'none';
    document.getElementById('kline-chart').style.display = 'block';
    if (chart) { chart.remove(); chart = null; }

    var corr = labeledStocks[code];
    if (corr && corr.start && corr.start !== '') {
      if (j.pattern) {
        j.pattern.uptrend_start_date = corr.start;
        j.pattern.uptrend_end_date = corr.peak;
        j.pattern.consolidation_start_date = corr.peak;
        j.pattern.consolidation_end_date = corr.end;
        j.pattern.corrected = true;
      }
    }

    renderKline(j.data, j.pattern);
    renderPattern(j.pattern);
    var cs = document.getElementById('currentStock');
    var corrTag = (corr && corr.start && corr.start !== '') ? ' <span style=\"color:var(--orange);font-size:11px\">(已纠正)</span>' : '';
    if (!cs.innerHTML || cs.innerHTML.indexOf(code) === -1) {
      cs.innerHTML = '<code>'+code+'</code>'+corrTag;
    }
    document.getElementById('stockCode').value = code;
  } catch(e) { alert('加载失败: '+e.message); }
}

async function aiAnalyze() {
  var code = document.getElementById('stockCode').value.trim();
  if (!code) return;
  var el = document.getElementById('aiResult');
  el.style.display = 'block';
  el.className = '';
  el.innerHTML = '<p style=\"color:var(--dim);text-align:center\">AI分析中…<br><small>正在获取基本面数据</small></p>';

  try {
    var r = await fetch('/api/ai/analyze/'+code);
    var j = await r.json();
    if (j.code !== 0) { el.innerHTML = '<p style=\"color:var(--red)\">'+j.msg+'</p>'; return; }
    var d = j.data;
    el.className = 'grade-'+d.grade;
    var g = d.grade;
    var badgeColor = g==='A'?'grade-A':g==='B'?'grade-B':g==='C'?'grade-C':'grade-D';
    var html = '<div class=\"grade-badge '+badgeColor+'\">'+d.icon+' '+d.grade+'级 · 基本面评分 '+d.score+'-'+d.max_score+'分 ('+d.score_ratio+'%)</div>';
    html += '<div style=\"color:var(--text);font-size:14px;font-weight:600;margin:6px 0\">'+d.verdict+'</div>';
    html += '<div style=\"margin-top:8px\">';
    if (d.positive_count) html += '<div style=\"color:var(--green);margin-bottom:4px\">✅ 亮点 ('+d.positive_count+'项):</div>';
    if (d.negative_count) html += '<div style=\"color:var(--red);margin-bottom:4px\">⚠️ 风险 ('+d.negative_count+'项):</div>';
    d.signals.forEach(function(s){
      var icon = s.type==='positive'?'✅':s.type==='negative'?'⚠️':s.type==='warning'?'⚠️':'ℹ';
      var color = s.type==='positive'? 'var(--green)' : s.type==='negative'? 'var(--red)' : s.type==='warning'? 'var(--orange)' : 'var(--dim)';
      html += '<div style=\"color:'+color+';font-size:12px\">'+icon+' '+s.text+'</div>';
    });
    html += '</div>';
    el.innerHTML = html;
  } catch(e) { el.innerHTML = '<p style=\"color:var(--red)\">分析失败: '+e.message+'</p>'; }
}

function renderKline(data, pattern) {
  if (!chart) createChart();
  const candles = [], volumes = [], maData = {ma5:[],ma10:[],ma20:[]};
  data.forEach((d,i) => {
    const t = d.time.includes('-') ? d.time : d.time.replace(/(\d{4})(\d{2})(\d{2})/,'$1-$2-$3');
    candles.push({time:t,open:d.open,high:d.high,low:d.low,close:d.close});
    volumes.push({time:t,value:d.volume,color: d.close>=d.open?'rgba(220,38,38,.25)':'rgba(22,163,74,.25)'});
  });
  candleSeries.setData(candles);
  volumeSeries.setData(volumes);

  const markers = [];
  const corrected = pattern && pattern.corrected;
  if (pattern) {
    const toTime = s => s.includes('-') ? s : s.replace(/(\d{4})(\d{2})(\d{2})/,'$1-$2-$3');
    markers.push({
      time: toTime(pattern.uptrend_start_date),
      position: 'belowBar',
      color: corrected ? '#22c55e' : '#fbbf24',
      shape: 'arrowUp',
      text: corrected ? '✓ 起点(纠)' : '上涨起点',
      size: corrected ? 4 : 3,
    });
    markers.push({
      time: toTime(pattern.uptrend_end_date),
      position: 'aboveBar',
      color: corrected ? '#22c55e' : '#f97316',
      shape: 'circle',
      text: corrected ? '✓ 峰顶(纠)' : '盘整起点',
      size: corrected ? 4 : 3,
    });
    markers.push({
      time: toTime(pattern.consolidation_end_date),
      position: 'belowBar',
      color: corrected ? '#22c55e' : '#22c55e',
      shape: 'arrowUp',
      text: corrected ? '✓ 结束(纠)' : '突破',
      size: corrected ? 4 : 3,
    });
  }
  candleSeries.setMarkers(markers);

  for (let i = 0; i < data.length; i++) {
    const t = data[i].time.includes('-') ? data[i].time : data[i].time.replace(/(\d{4})(\d{2})(\d{2})/,'$1-$2-$3');
    for (let p of [5,10,20]) {
      if (i >= p-1) {
        let sum = 0; for (let j=i-p+1;j<=i;j++) sum += data[j].close;
        maData['ma'+p].push({time:t, value:sum/p});
      }
    }
  }
  Object.entries(maData).forEach(([k,v]) => { if (v.length) lineSeries[k].setData(v); });
  chart.timeScale().fitContent();
}

function renderPattern(p) {
  const el = document.getElementById('patternDetail');
  if (!p) { el.style.display='none'; return; }
  el.style.display = 'grid';
  var typeHtml = p.corrected
    ? '<div class="item"><div class="label">形态类型</div><div class="value">厂字形态 <span style="color:var(--orange);font-size:11px">(已纠正)</span></div></div>'
    : '<div class="item"><div class="label">形态类型</div><div class="value">厂字形态</div></div>';
  el.innerHTML = typeHtml
    + '<div class="item"><div class="label">综合评分</div><div class="value">'+p.pattern_score.toFixed(2)+'</div></div>'
    + '<div class="item"><div class="label">上涨涨幅</div><div class="value text-green">+'+(p.uptrend_gain*100).toFixed(1)+'%</div></div>'
    + '<div class="item"><div class="label">盘整天数</div><div class="value">'+p.consolidation_days+'天</div></div>'
    + '<div class="item"><div class="label">上涨段</div><div class="value">'+p.uptrend_start_date+' → '+p.uptrend_end_date+'</div></div>'
    + '<div class="item"><div class="label">盘整段</div><div class="value">'+p.consolidation_start_date+' → '+p.consolidation_end_date+'</div></div>';
}

function addLog(type, msg) {
  const el = document.getElementById('scanLog');
  const t = new Date().toLocaleTimeString('zh-CN',{hour12:false});
  const cls = type==='err'?'err':type==='warn'?'warn':type==='ok'?'ok':'info';
  el.innerHTML = `<div class="${cls}">[${t}] ${msg}</div>` + el.innerHTML;
  if (el.children.length > 40) el.removeChild(el.lastChild);
}

async function startScan() {
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').disabled = false;
  document.getElementById('scanResults').innerHTML = '';
  document.getElementById('scanLog').innerHTML = '';
  const mode = parseInt(document.getElementById('scanMode').value);
  addLog('info', mode===0?'启动全量扫描…':'启动增量扫描（200只）…');
  try {
    const r = await fetch('/api/scan/start', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({limit:mode})});
    const j = await r.json();
    if (j.code !== 0) return addLog('err','启动失败: '+j.msg);
    addLog('info','扫描已启动');
    scanTimer = setInterval(pollProgress, 1000);
    pollProgress();
  } catch(e) { addLog('err','请求失败: '+e.message); resetScanBtn(); }
}

async function pollProgress() {
  try {
    const r = await fetch('/api/scan/progress');
    const j = await r.json();
    const d = j.data;
    document.getElementById('scanProgress').style.width = d.percent+'%';
    document.getElementById('scanStatus').innerText = d.running
      ? `扫描中 ${d.progress}/${d.total} (${d.percent}%) | 已匹配 ${d.matched} | 当前: ${d.current}`
      : `已完成 ${d.progress}/${d.total} | 匹配 ${d.matched} 只`;

    if (d.matched > 0) {
      const rr = await fetch('/api/scan/results');
      const rj = await rr.json();
      showResults(rj.data);
    }

    if (!d.running) { stopPolling(); resetScanBtn(); addLog('ok', d.progress>0 ? `扫描完成！共 ${d.total} 只，匹配 ${d.matched} 只` : '扫描结束');
      loadLastScan();
    }
  } catch(e) {}
}

function showResults(results) {
  const el = document.getElementById('scanResults');
  if (!results.length) { el.innerHTML = '<p class=\"text-dim\" style=\"padding:16px\">未发现匹配形态</p>'; return; }

  const statusLabel = {new:'🆕 新增', kept:'✅ 保持', changed:'📈 变化', exited:'🚫 退出'};
  const statusTag = {new:'tag-green', kept:'tag-blue', changed:'tag-orange', exited:'tag-gray'};

  let html = '<table><thead><tr><th></th><th>代码</th><th>名称</th><th>评分</th><th>涨幅</th><th>盘整</th><th>状态</th><th>日期</th><th>ML</th></tr></thead><tbody>';
  results.forEach(p => {
    const st = p.status || 'new';
    const fid = p.stock_code;
    const isNew = !viewedStocks.has(fid);
    const dot = isNew ? '<span class=\"new-dot\"></span>' : '';
    const rowAttrs = (st==='exited'?' style=\"opacity:.5\"':'') + (isNew?' class=\"unviewed\"':'');
    const ls = labeledStocks[fid];
    var mlCell;
    if (ls) {
      if (ls.type === 'good') mlCell = '<span class=\"ml-model-ready\" style=\"font-size:11px\">✓ 已标注</span>';
      else if (ls.type === 'corrected') mlCell = '<span class=\"ml-corrected\" style=\"font-size:11px\">✗ 已纠正</span>';
      else if (ls.type === 'wrong') mlCell = '<span class=\"ml-corrected\" style=\"font-size:11px\">✗ 完全不符</span>';
      else mlCell = '<button class=\"btn-ml btn-accept\" onclick=\"event.stopPropagation();mlAction(\'good\',\''+fid+'\')\" title=\"形态正确\">✅</button> <button class=\"btn-ml btn-reject\" onclick=\"event.stopPropagation();mlAction(\'bad\',\''+fid+'\')\" title=\"形态不对\">❌</button>';
    } else {
      mlCell = '<button class=\"btn-ml btn-accept\" onclick=\"event.stopPropagation();mlAction(\'good\',\''+fid+'\')\" title=\"形态正确\">✅</button> <button class=\"btn-ml btn-reject\" onclick=\"event.stopPropagation();mlAction(\'bad\',\''+fid+'\')\" title=\"形态不对\">❌</button>';
    }
    html += '<tr id=\"row-'+fid+'\" data-code=\"'+fid+'\"'+rowAttrs+'><td>'+dot+'</td>'+
      '<td><code>'+fid+'</code></td><td>'+p.stock_name+'</td>'+
      '<td><span class=\"tag tag-green\">'+p.pattern_score.toFixed(2)+'</span></td>'+
      '<td class=\"text-green\">+'+(p.uptrend_gain*100).toFixed(1)+'%</td>'+
      '<td>'+p.consolidation_days+'天</td>'+
      '<td><span class=\"tag '+(statusTag[st]||'tag-gray')+'\">'+(statusLabel[st]||st)+'</span></td>'+
      '<td>'+p.consolidation_end_date+'</td>'+
      '<td id=\"ml-'+fid+'\">'+mlCell+'</td></tr>';
  });
  html += '</tbody></table>';
  el.innerHTML = html;

  scanResultsStore = results;
  loadMLStats();
}

async function loadLastScan() {
  try {
    const r = await fetch('/api/scan/last');
    const j = await r.json();
    const d = j.data;
    if (d.last_scan) {
      document.getElementById('lastScanInfo').style.display = '';
      document.getElementById('lastScanInfo').innerHTML = `上次扫描: ${d.last_scan} | 匹配: ${d.data.filter(x=>x.status!=='exited').length} 只 | 已退出: ${d.data.filter(x=>x.status==='exited').length} 只`;
      if (d.data.length) showResults(d.data);
    }
    const pr = await fetch('/api/scan/progress');
    const pj = await pr.json();
    if (pj.data.last_scan && !pj.data.running) {
      document.getElementById('lastScanInfo').style.display = '';
    }
  } catch(e) {}
}

function viewStock(code, name) {
  document.getElementById('stockCode').value = code;
  document.getElementById('currentStock').innerHTML = '<code>'+code+'</code> <span class="name">'+(name||'')+'</span>';
  viewedStocks.add(code);
  var row = document.getElementById('row-'+code);
  if (row) { row.classList.remove('unviewed'); var dot = row.querySelector('.new-dot'); if (dot) dot.remove(); }
  analyzeStock();
}

function stopScan() {
  fetch('/api/scan/stop',{method:'POST'});
  stopPolling();
  resetScanBtn();
  addLog('warn','已请求停止扫描');
}

function stopPolling() { if (scanTimer) { clearInterval(scanTimer); scanTimer = null; } }
function resetScanBtn() { document.getElementById('btnStart').disabled=false; document.getElementById('btnStop').disabled=true; }

let mlFeatures = {};
let mlCurrentCode = '';

async function loadMLFeatures(code) {
  if (mlFeatures[code]) return mlFeatures[code];
  try {
    const r = await fetch(`/api/ml/features/${code}`);
    const j = await r.json();
    if (j.code === 0 && j.features) {
      mlFeatures[code] = {features: j.features, pattern: j.pattern, ml_prob: j.ml_probability};
      return mlFeatures[code];
    }
  } catch(e) {}
  return null;
}

async function mlAction(label, code) {
  var info = scanResultsStore.find(function(r){return r.stock_code===code;});
  var name = info ? info.stock_name : '';
  if (label === 'good') return labelGood(code, name);
  if (label === 'bad') return labelBad(code, name);
}

async function labelGood(code, name) {
  const data = await loadMLFeatures(code);
  if (!data) return alert('无法加载特征数据');
  const r = await fetch('/api/ml/label', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      stock_code: code, stock_name: name, label: 'good',
      features: data.features,
    }),
  });
  const j = await r.json();
  if (j.code === 0) {
    labeledStocks[code] = {type: 'good'};
    updateMLStats(j);
    showResults(scanResultsStore);
  }
}

async function labelBad(code, name) {
  correctCode = code;
  correctName = name;
  document.getElementById('choiceMsg').textContent = name+' ('+code+')\n\n该形态有问题，请选择：';
  document.getElementById('choiceBtn1').textContent = '修改';
  document.getElementById('choiceBtn1').onclick = function(){
    closeChoiceDialog();
    startCorrectMode(code, name);
  };
  document.getElementById('choiceBtn2').textContent = '完全不符';
  document.getElementById('choiceBtn2').onclick = async function(){
    closeChoiceDialog();
    var data = await loadMLFeatures(code);
    var r = await fetch('/api/ml/label', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        stock_code: code, stock_name: name, label: 'bad',
        correct_start: '', correct_peak: '', correct_end: '',
        features: (data && data.features) ? data.features : {},
      }),
    });
    var j = await r.json();
    if (j.code === 0) {
      labeledStocks[code] = {type: 'wrong'};
      updateMLStats(j);
      showResults(scanResultsStore);
    }
  };
  document.getElementById('choiceDialog').classList.add('active');
  document.getElementById('choiceOverlay').classList.add('active');
}

function closeChoiceDialog() {
  document.getElementById('choiceDialog').classList.remove('active');
  document.getElementById('choiceOverlay').classList.remove('active');
}

async function startCorrectMode(code, name) {

  cancelCorrect();
  correctCode = code;
  correctName = name;
  correctClicks = [];
  document.getElementById('stockCode').value = code;
  document.getElementById('currentStock').innerHTML = '<code>'+code+'</code> <span class="name">'+(name||'')+'</span>';
  document.getElementById('kline-placeholder').style.display = 'none';
  document.getElementById('kline-chart').style.display = 'block';
  document.getElementById('patternDetail').style.display = 'none';
  try {
    var r2 = await fetch('/api/stock/'+code+'?days=500');
    var j2 = await r2.json();
    if (j2.code !== 0) return alert(j2.msg);
    if (chart) { chart.remove(); chart = null; }
    correctMode = true;
    renderKline(j2.data, j2.pattern);
    document.getElementById('correctBanner').style.display = 'block';
    document.getElementById('btnConfirm').style.display = 'none';
    updateCorrectSteps();
  } catch(e) { alert('加载失败: '+e.message); }
}

function cancelCorrect() {
  correctMode = false;
  correctClicks = [];
  correctCode = '';
  correctName = '';
  document.getElementById('correctBanner').style.display = 'none';
  document.getElementById('btnConfirm').style.display = 'none';
  document.getElementById('stepStart').className = 'step';
  document.getElementById('stepPeak').className = 'step';
  document.getElementById('stepEnd').className = 'step';
  document.getElementById('correctHint').textContent = '点击K线上任意蜡烛 → 选中日期';
}

function updateCorrectSteps() {
  var n = correctClicks.length;
  var steps = [document.getElementById('stepStart'), document.getElementById('stepPeak'), document.getElementById('stepEnd')];
  var labels = ['上涨起点', '峰顶', '盘整结束'];
  steps.forEach(function(s,i){
    s.textContent = (i===0?'①':i===1?'②':'③')+labels[i];
    s.className = 'step' + (i===n?' active':i<n?' done':'');
    if (correctClicks[i]) s.textContent += ': '+correctClicks[i];
  });
  if (n === 1) document.getElementById('correctHint').textContent = '✅ 起点: '+correctClicks[0]+' | 下一步：点击峰顶';
  else if (n === 2) document.getElementById('correctHint').textContent = '✅ 起点: '+correctClicks[0]+' | ✅ 峰顶: '+correctClicks[1]+' | 下一步：点击盘整结束';
  else if (n >= 3) {
    document.getElementById('correctHint').textContent = '✅ 起点: '+correctClicks[0]+' | ✅ 峰顶: '+correctClicks[1]+' | ✅ 结束: '+correctClicks[2];
    document.getElementById('btnConfirm').style.display = '';
    correctMode = false;
  }
}

async function submitChartCorrection() {
  var code = correctCode;
  var start = correctClicks[0] || '';
  var peak = correctClicks[1] || '';
  var end = correctClicks[2] || '';

  var data = await loadMLFeatures(code);
  var feat = (data && data.features) ? data.features : {};
  if (start && peak && end) {
    try {
      var dfr = await fetch('/api/stock/'+code+'?days=500');
      var dfj = await dfr.json();
      if (dfj.code === 0 && dfj.data && dfj.data.length) {
        var si = -1, pi = -1, ei = -1;
        for (var i = 0; i < dfj.data.length; i++) {
          if (dfj.data[i].time.slice(0,10) === start) si = i;
          if (dfj.data[i].time.slice(0,10) === peak) pi = i;
          if (dfj.data[i].time.slice(0,10) === end) ei = i;
        }
        if (si>=0 && pi>=0 && ei>=0 && si<pi && pi<ei) {
          try{
            var fr = await fetch('/api/ml/features/'+code);
            var fj = await fr.json();
            if (fj.code===0 && fj.features) feat = fj.features;
          }catch(ign){}
        }
      }
    } catch(ign) {}
  }

  var r = await fetch('/api/ml/label', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      stock_code: code, stock_name: correctName,
      label: 'bad', correct_start: start, correct_peak: peak, correct_end: end,
      features: feat,
    }),
  });
  var j = await r.json();
  cancelCorrect();
  if (j.code === 0) {
    labeledStocks[code] = {type: 'corrected', start: start, peak: peak, end: end};
    updateMLStats(j);
    showResults(scanResultsStore);
  }
}

function closeMLPanel() {
  document.getElementById('mlPanel').classList.remove('active');
  document.getElementById('mlOverlay').classList.remove('active');
}

async function submitCorrection() {
  var code = mlCurrentCode;
  var start = document.getElementById('mlCorrectStart').value.trim();
  var peak = document.getElementById('mlCorrectPeak').value.trim();
  var end = document.getElementById('mlCorrectEnd').value.trim();

  var data = await loadMLFeatures(code);
  if (!data) return alert('无法加载特征数据');

  var r = await fetch('/api/ml/label', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      stock_code: code, stock_name: data.pattern?.stock_name || '',
      label: 'bad', correct_start: start, correct_peak: peak, correct_end: end,
      features: data.features,
    }),
  });
  var j = await r.json();
  closeMLPanel();
  if (j.code === 0) {
    document.getElementById('ml-'+code).innerHTML = '<span class="ml-corrected" style="font-size:11px">✗ 已纠正</span>';
    updateMLStats(j);
  }
}

function updateMLStats(j) {
  const el = document.getElementById('mlStats');
  const s = j.stats || {};
  const m = j.metrics || {};
  el.style.display = '';
  el.innerHTML = 'ML标注: <strong>'+(s.total||0)+'条</strong> (✅'+(s.good||0)+' ❌'+(s.bad||0)+') '+(m.train_accuracy?'| 训练准确率: <strong>'+(m.train_accuracy*100).toFixed(0)+'%</strong> ':'')+(s.total>=5?'| 模型: <strong class=\"ml-model-ready\">已就绪</strong>':'| 还需 <strong>'+(5-(s.total||0))+'</strong> 条标注');
}

async function loadMLStats() {
  try {
    const r = await fetch('/api/ml/stats');
    const j = await r.json();
    if (j.code === 0) {
      const m = j.model || {};
      const l = j.labels || {};
      const el = document.getElementById('mlStats');
      el.style.display = '';
      el.innerHTML = 'ML标注: <strong>'+(l.total||0)+'条</strong> (✅'+(l.good||0)+' ❌'+(l.bad||0)+') '+(l.total>=5?'| 模型: <strong class=\"ml-model-ready\">已就绪</strong>':'| 还需 <strong>'+(5-(l.total||0))+'</strong> 条标注可训练模型');
    }
  } catch(e) {}
}
</script>
